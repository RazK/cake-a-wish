<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cake-A-Wish</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">

    <header class="site-header">
      <h1>🎂 <span class="wordmark">Cake A Wish</span></h1>
    </header>

    <!-- Printer settings with WiFi / BT tabs -->
    <details class="settings-panel" open>
      <summary>
        <span class="summary-title">🖨️ Printer</span>
        <span id="printerStatus" class="printer-status checking" title="Click to recheck"></span>
      </summary>
      <div class="settings-body">
        <div class="setting-row">
          <span class="setting-label">IP</span>
          <input id="printerIp" class="setting-input" type="text" value="{{ default_printer_ip }}" />
        </div>
        <div class="setting-row">
          <span class="setting-label">Password</span>
          <input id="password" class="setting-input" type="password" autocomplete="current-password" />
        </div>
        <div id="jobStatus" hidden></div>
      </div>
    </details>

    <!-- Label selection -->
    <details class="settings-panel" open>
      <summary><span class="summary-title">🏷️ Label</span></summary>
      <div class="settings-body">
        <div id="carousel"></div>
      </div>
    </details>

    <div id="canvasWrap">
      <div id="previewContainer">
        <canvas id="preview"></canvas>
        <svg id="previewOverlay"></svg>
      </div>
    </div>

    <!-- Image settings -->
    <details class="settings-panel" open>
      <summary><span class="summary-title">🎨 Image</span></summary>
      <div class="settings-body image-controls">
        <div class="ctrl-row">
          <div class="btn-group" data-setting="fitMode">
            <button class="seg active" data-value="contain">Contain</button>
            <button class="seg"        data-value="cover">Cover</button>
            <button class="seg"        data-value="stretch">Stretch</button>
          </div>
          <div class="btn-group" data-setting="mirror">
            <button class="seg"        data-value="off">No mirror</button>
            <button class="seg active" data-value="on">Mirror</button>
          </div>
          <button id="rotateBtn" title="Rotate 90°">↻</button>
        </div>
      </div>
    </details>

    <div id="controls">
      <button id="captureBtn">Capture</button>
      <button id="quickPrintBtn" title="Capture &amp; print immediately" disabled>⚡</button>
      <input id="loadInput" type="file" accept="image/*" hidden />
      <button id="loadBtn" title="Load image file">📂</button>
      <button id="saveBtn" title="Save image" disabled>💾</button>
      <button id="printBtn" disabled>Print</button>
    </div>

    <p id="status"></p>

  </div>

  <video id="video" autoplay playsinline muted></video>
  <script type="module" src="/static/app.js"></script>
</body>
</html>

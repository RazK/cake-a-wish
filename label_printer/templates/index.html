<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cake-A-Wish</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <div class="site-header">
      <h1>Cake-A-Wish</h1>
      <span id="labelBadge" class="label-badge"></span>
    </div>

    <div id="viewer">
      <video id="video" autoplay playsinline muted></video>
      <img id="snapshot" alt="Captured photo" hidden />
    </div>

    <div id="previewWrap" hidden>
      <p class="section-title">Label Preview</p>
      <img id="labelPreview" alt="Label preview" />
    </div>

    <div id="controls">
      <button id="capture">Capture</button>
      <button id="uploadBtn" type="button">Upload image</button>
      <button id="retake" hidden>Retake</button>
      <button id="print" hidden>Print</button>
    </div>

    <input id="imageUpload" type="file" accept="image/*" hidden />
    <p id="uploadName" class="upload-name"></p>

    <p id="status">Starting camera…</p>

    <div class="settings-panel">
      <div class="setting-row">
        <span class="setting-label">Mirror</span>
        <div class="btn-group" data-setting="mirror">
          <button class="seg" data-value="off">Off</button>
          <button class="seg active" data-value="on">On</button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">B&amp;W</span>
        <div class="btn-group" data-setting="bwMode">
          <button class="seg active" data-value="dither">Dither</button>
          <button class="seg" data-value="atkinson">Atkinson</button>
          <button class="seg" data-value="threshold">Threshold</button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Fit</span>
        <div class="btn-group" data-setting="fitMode">
          <button class="seg active" data-value="contain">Contain</button>
          <button class="seg" data-value="cover">Cover</button>
          <button class="seg" data-value="stretch">Stretch</button>
        </div>
      </div>

      <details id="advanced">
        <summary>Advanced</summary>
        <div class="advanced-grid">
          <label>
            Printer IP
            <input id="printerIp" type="text" value="{{ default_printer_ip }}" />
          </label>
          <label>
            Label
            <input id="labelId" type="text" value="{{ default_label_id }}" />
          </label>
          <label>
            Password
            <input id="password" type="password" autocomplete="current-password" />
          </label>
          <label class="checkbox">
            <input id="rotate" type="checkbox" checked />
            Rotate for long axis
          </label>
        </div>
      </details>
    </div>
  </div>

  <script type="module" src="/static/app.js"></script>
</body>
</html>

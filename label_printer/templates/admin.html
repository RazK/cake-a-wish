<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cake A Wish — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/admin.css">
</head>
<body>

<header>
  <h1>🎂 <span class="wordmark">Cake A Wish</span></h1>
  <div id="pill" class="pill">Checking…</div>
</header>

<div class="workspace">

  <div class="preview-wrap">
    <canvas id="preview"></canvas>
  </div>

  <aside class="sidebar">

    <div class="card">
      <p class="card-label">Template</p>
      <div id="tpl-list" class="tpl-list"></div>
    </div>

    <div class="card">
      <p class="card-label">Image</p>
      <div class="ctrl-rows">

        <div class="ctrl-row">
          <span class="ctrl-lbl">Fit</span>
          <div class="segs" data-state="fitMode">
            <button class="seg active" data-val="contain">Contain</button>
            <button class="seg"        data-val="cover">Cover</button>
            <button class="seg"        data-val="stretch">Stretch</button>
          </div>
        </div>

        <div class="ctrl-row">
          <span class="ctrl-lbl">Mirror</span>
          <div class="segs" data-state="mirror">
            <button class="seg"        data-val="off">Off</button>
            <button class="seg active" data-val="on">On</button>
          </div>
        </div>

        <div class="ctrl-row">
          <span class="ctrl-lbl">Rotate</span>
          <button id="rotate-btn" class="ghost-btn">↻ 90°</button>
        </div>

        <div class="ctrl-row">
          <span class="ctrl-lbl">Brightness</span>
          <input id="brightness" type="range" min="-100" max="100" value="0">
          <output id="brightness-out">0</output>
        </div>

      </div>
    </div>

  </aside>
</div>

<div class="action-bar">
  <button id="capture-btn" class="btn btn-outline">Capture</button>
  <button id="quick-btn"   class="btn btn-icon" title="Capture &amp; print immediately" disabled>⚡</button>
  <input  id="load-input"  type="file" accept="image/*" hidden>
  <button id="load-btn"    class="btn btn-icon" title="Load from file">📂</button>
  <button id="save-btn"    class="btn btn-icon" title="Save image" disabled>💾</button>
  <button id="print-btn"   class="btn btn-primary" disabled>Print</button>
</div>

<section class="gallery-wrap">
  <p class="card-label">Gallery <span class="card-label-note">last 8 · click to re-edit</span></p>
  <div id="gallery"></div>
</section>

<details class="settings">
  <summary>⚙ Settings</summary>
  <div class="settings-body">
    <label class="setting-row">
      <span class="ctrl-lbl">Printer IP</span>
      <input id="printer-ip" class="text-field" type="text" value="{{ default_ip }}">
    </label>
  </div>
</details>

<p id="status-bar"></p>

<video id="video" playsinline muted></video>
<script src="/static/admin.js"></script>
</body>
</html>
